{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Update Restaurant - Meal Mate</title>
</head>
<body>
    <form action="{% url 'update_restaurant' restaurant.id %}" method="post">
        {% csrf_token %}
        <label>Restaurant name </label>
        <input type="text" name="name" value="{{restaurant.name}}">
        <br><br>
        <label>Picture url </label>
        <input type="text" name="picture" value="{{restaurant.picture}}">
        <br><br>
        <label>Cuisine </label>
        <input type="text" name="cuisine" value="{{restaurant.cuisine}}">
        <br><br>
        <label>Rating</label>
        <input type="number" name="rating" min="0" max="5" step="0.5" value="{{restaurant.rating}}">
        <br><br>
        <br><br>
        <button type="submit">Update Restaurant</button>
    </form>
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navbar-brand">🍔 Meal Mate Admin</div>
            <div class="nav-links">
                <a href="open_show_restaurant" class="outline-btn">Back</a>
                <a href="/" class="outline-btn">Logout</a>
            </div>
        </nav>

        <!-- ADMIN CONTAINER -->
        <div class="admin-container">
            <aside class="sidebar">
                <h3>Admin Menu</h3>
                <ul class="sidebar-menu">
                    <li><a href="open_show_restaurant">Manage Restaurants</a></li>
                    <li><a href="open_add_restaurant">Add Restaurant</a></li>
                </ul>
            </aside>

            <main class="admin-content">
                <div class="admin-card">
                    <h2>Update Restaurant</h2>
                    <form action="{% url 'update_restaurant' restaurant.id %}" method="post" class="admin-form">
                        {% csrf_token %}
                    
                        <div class="form-group">
                            <label for="name">Restaurant Name</label>
                            <input type="text" id="name" name="name" required value="{{restaurant.name}}">
                        </div>
                    
                        <div class="form-group">
                            <label for="picture">Picture URL</label>
                            <input type="url" id="picture" name="picture" required value="{{restaurant.picture}}">
                        </div>
                    
                        <div class="form-group">
                            <label for="cuisine">Cuisine Type</label>
                            <input type="text" id="cuisine" name="cuisine" required value="{{restaurant.cuisine}}">
                        </div>
                    
                        <div class="form-group">
                            <label for="rating">Rating (0-5)</label>
                            <input type="number" id="rating" name="rating" min="0" max="5" step="0.5" value="{{restaurant.rating}}">
                        </div>
                    
                        <button type="submit" class="primary-btn full-width">Update Restaurant</button>
                    </form>
                </div>
            </main>
        </div>

    </body>
</html>
