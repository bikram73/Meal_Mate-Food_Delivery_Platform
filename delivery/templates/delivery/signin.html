{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Sign In - Meal Mate</title>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-brand">🍔 Meal Mate</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="{% url 'open_signup' %}" class="primary-btn">Sign Up</a>
        </div>
    </nav>

    <!-- AUTH CONTAINER -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your Meal Mate account</p>
            
            <form action="{% url 'signin' %}" method="post" class="auth-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username or email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="primary-btn full-width">Sign In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a href="{% url 'open_signup' %}">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
